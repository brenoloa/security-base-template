spring.application.name=security-kit

# H2 in-memory datasource for local development
spring.datasource.url=jdbc:h2:mem:securitykit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate behavior for local usage
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
