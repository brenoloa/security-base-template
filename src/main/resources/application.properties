spring.application.name=security-kit
server.port=${PORT:8080}

security.jwt.secret=my-very-long-and-secure-secret-key-that-must-be-at-least-32-bytes
security.jwt.expiration=3600

# H2 in-memory datasource for local development
spring.datasource.url=jdbc:h2:mem:securitykit;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate behavior for local usage
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
